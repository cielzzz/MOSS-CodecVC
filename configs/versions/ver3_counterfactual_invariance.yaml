version:
  id: ver3
  name: counterfactual_timbre_invariance
  description: Add counterfactual source views so the target output is invariant to source-speaker timbre.

data:
  needs_new_audio: true
  needs_counterfactual_source: true
  needs_speaker_embeddings: false
  new_audio_type: synthetic_counterfactual_source

objectives:
  codec_ce: 1.0
  role_routing: 0.1
  counterfactual_consistency: 0.2

model_hooks:
  role_embeddings: true
  codebook_routing: learned_soft_gate
  counterfactual_group_loss: true

notes:
  - Does not need new human labels.
  - It does need generated counterfactual source wavs or equivalent source-view codes.
  - Each original source view and counterfactual source view should share the same target.
